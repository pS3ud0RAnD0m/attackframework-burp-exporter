name: Bug report
description: Report a bug in Attack Framework: Burp Exporter
title: "[BUG] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before submitting:
        - Confirm you're using the latest version
        - Search existing issues
        - Do NOT use this form for security issues (see Security tab)

  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: e.g. v0.0.1 or commit hash
    validations:
      required: true

  - type: input
    id: burp
    attributes:
      label: Burp Suite version
      placeholder: e.g. 2025.6
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots