name: Build & Release Burp Extension

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/wrapper-validation-action@v3

      - name: Set up JDK 21 (Corretto)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle execute permission
        run: chmod +x gradlew

      - name: Build extension
        run: ./gradlew --no-daemon clean build

      - name: Read Gradle properties
        id: props
        run: |
          python <<'PY'
          import os
          from pathlib import Path

          props = {}
          for line in Path("gradle.properties").read_text(encoding="utf-8").splitlines():
              line = line.strip()
              if not line or line.startswith("#") or "=" not in line:
                  continue
              key, value = line.split("=", 1)
              props[key.strip()] = value.strip()

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"basename={props['archivesBaseName']}\n")
              fh.write(f"version={props['version']}\n")
          PY

      - name: Delete existing release and tag
        run: |
          gh release delete v${{ steps.props.outputs.version }} -y || true
          git push origin :refs/tags/v${{ steps.props.outputs.version }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ steps.props.outputs.version }}
          name: v${{ steps.props.outputs.version }}
          allowUpdates: true
          replacesArtifacts: true
          artifacts: build/libs/${{ steps.props.outputs.basename }}-${{ steps.props.outputs.version }}.jar
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            In early development.
